<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SparkSwitch Lite - Game Settings</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;600;800&amp;family=JetBrains+Mono:wght@500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-dim": "#131315",
                        "surface-container-high": "#2a2a2c",
                        "on-secondary": "#65002e",
                        "surface-bright": "#39393b",
                        "on-secondary-fixed": "#3f001a",
                        "on-primary": "#003543",
                        "on-surface-variant": "#bbc9cf",
                        "outline-variant": "#3c494e",
                        "inverse-surface": "#e5e1e4",
                        "surface-container-low": "#1c1b1d",
                        "on-error": "#690005",
                        "secondary-fixed": "#ffd9e1",
                        "surface-container-lowest": "#0e0e10",
                        "inverse-on-surface": "#313032",
                        "on-tertiary-fixed-variant": "#005233",
                        "secondary-fixed-dim": "#ffb1c4",
                        "on-primary-container": "#00566a",
                        "primary-fixed": "#b6ebff",
                        "secondary": "#ffb1c4",
                        "background": "#131315",
                        "primary-fixed-dim": "#47d6ff",
                        "surface": "#131315",
                        "surface-tint": "#47d6ff",
                        "on-surface": "#e5e1e4",
                        "on-background": "#e5e1e4",
                        "error": "#ffb4ab",
                        "on-primary-fixed": "#001f28",
                        "surface-variant": "#353437",
                        "outline": "#859399",
                        "surface-container": "#201f21",
                        "on-secondary-fixed-variant": "#8f0044",
                        "surface-container-highest": "#353437",
                        "tertiary-fixed-dim": "#00e296",
                        "on-tertiary": "#003822",
                        "tertiary-container": "#00dc92",
                        "on-error-container": "#ffdad6",
                        "tertiary-fixed": "#4dffb1",
                        "on-tertiary-fixed": "#002112",
                        "primary": "#a5e7ff",
                        "secondary-container": "#ff4a8d",
                        "error-container": "#93000a",
                        "on-primary-fixed-variant": "#004e60",
                        "primary-container": "#00d2ff",
                        "inverse-primary": "#00677f",
                        "on-tertiary-container": "#005b3a",
                        "on-secondary-container": "#590028",
                        "tertiary": "#00fca8"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xl": "40px",
                        "hud-padding": "12px",
                        "sm": "8px",
                        "playfield-margin": "64px",
                        "unit": "4px",
                        "lg": "24px",
                        "md": "16px",
                        "xs": "4px"
                    },
                    "fontFamily": {
                        "body-lg": ["Geist"],
                        "display-lg": ["Geist"],
                        "body-sm": ["Geist"],
                        "headline-md": ["Geist"],
                        "label-mono": ["JetBrains Mono"],
                        "label-score": ["JetBrains Mono"],
                        "display-sm": ["Geist"]
                    },
                    "fontSize": {
                        "body-lg": ["18px", { "lineHeight": "1.6", "letterSpacing": "0em", "fontWeight": "400" }],
                        "display-lg": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.04em", "fontWeight": "800" }],
                        "body-sm": ["14px", { "lineHeight": "1.6", "letterSpacing": "0em", "fontWeight": "400" }],
                        "headline-md": ["24px", { "lineHeight": "1.4", "letterSpacing": "0em", "fontWeight": "600" }],
                        "label-mono": ["12px", { "lineHeight": "1", "letterSpacing": "0.1em", "fontWeight": "500" }],
                        "label-score": ["20px", { "lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "700" }],
                        "display-sm": ["32px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "800" }]
                    }
                }
            }
        }
    </script>
<style>
        .neon-glow-primary {
            box-shadow: 0 0 16px rgba(165, 231, 255, 0.4);
        }
        .neon-glow-secondary {
            box-shadow: 0 0 16px rgba(255, 74, 141, 0.4);
        }
        .glass-panel {
            background-color: rgba(19, 19, 21, 0.8);
            backdrop-filter: blur(12px);
        }
        .rail-active {
            filter: brightness(1.5);
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen relative overflow-hidden flex items-center justify-center font-body-lg">
<!-- Blurred Background simulating gameplay -->
<div class="absolute inset-0 z-0 opacity-40 blur-md pointer-events-none" data-alt="Abstract cyber-minimalist gameplay background with high-velocity neon blue rails moving vertically across a deep void black playfield. Glowing pink timing indicators and sharp geometric obstacles create a sense of extreme speed and precision. The overall aesthetic is heavily stylized, blending dark brutalism with vibrant futuristic light trails." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuABmPgI9bStgpF-diS6n7WfEt-eCwQ--kQTk8iAgWsjnwCIyucFFl2ERX55hcLGA-4yvGjAJDfDN5IJ7D2LiKeVNZkBmN_Mrtvyl8wH0kZEjVF49eZLW_2p3C3DOv8eNUkPo3AhUUYNFWYYHfQoFS-1Ix-6tAXI5pxGSpRxHOqyova9veaeFOFllB_y-tL87M7lgFKOK-lufrmUypSaoKqVP-1CDbH8secQIxucOqynjLrByApESnTMtMpyDQ-YlzzGsb3i7EKxLqs'); background-size: cover; background-position: center;">
</div>
<!-- Overlay Backdrop -->
<div class="absolute inset-0 bg-surface-lowest/60 backdrop-blur-[20px] z-10"></div>
<!-- Top App Bar (Suppressed via filter, not rendered as this is an overlay modal) -->
<!-- Settings Overlay Modal -->
<div class="relative z-20 w-full max-w-md mx-md glass-panel border border-primary/50 rounded-xl overflow-hidden neon-glow-primary flex flex-col shadow-2xl">
<!-- Modal Header -->
<div class="border-t-[4px] border-secondary-container px-lg py-md flex items-center justify-between border-b border-outline-variant/30">
<h2 class="font-headline-md text-headline-md text-on-surface">Settings</h2>
<button aria-label="Close settings" class="text-on-surface-variant hover:text-tertiary transition-colors active:scale-95 duration-100 flex items-center justify-center">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">close</span>
</button>
</div>
<!-- Modal Content -->
<div class="p-lg flex flex-col gap-lg">
<!-- Difficulty Slider -->
<div class="flex flex-col gap-sm">
<label class="font-label-mono text-label-mono text-primary uppercase tracking-widest">Difficulty</label>
<div class="flex items-center gap-md">
<span class="font-body-sm text-body-sm text-on-surface-variant">Slow</span>
<input class="w-full h-1 bg-surface-variant rounded-full appearance-none cursor-pointer accent-primary" max="5" min="1" type="range" value="3"/>
<span class="font-body-sm text-body-sm text-secondary">Hyper</span>
</div>
</div>
<!-- Visual Options -->
<div class="flex flex-col gap-sm">
<label class="font-label-mono text-label-mono text-primary uppercase tracking-widest">Visuals</label>
<div class="flex items-center justify-between bg-surface-container-high p-sm rounded-lg border border-outline-variant/30">
<span class="font-body-sm text-body-sm">Motion Blur</span>
<button aria-checked="true" class="relative inline-flex h-6 w-11 items-center rounded-full bg-primary" role="switch">
<span class="translate-x-6 inline-block h-4 w-4 transform rounded-full bg-surface-dim transition"></span>
</button>
</div>
</div>
<!-- Input Help -->
<div class="flex flex-col gap-sm">
<label class="font-label-mono text-label-mono text-primary uppercase tracking-widest">Controls</label>
<div class="bg-surface-container-high p-md rounded-lg border border-outline-variant/30 flex flex-col gap-xs">
<div class="flex justify-between items-center">
<span class="font-body-sm text-body-sm text-on-surface-variant">Switch Rails</span>
<div class="flex gap-2">
<span class="bg-surface-dim border border-outline-variant px-2 py-1 rounded font-label-mono text-label-mono text-on-surface">SPACE</span>
<span class="bg-surface-dim border border-outline-variant px-2 py-1 rounded font-label-mono text-label-mono text-on-surface">CLICK</span>
</div>
</div>
<div class="flex justify-between items-center mt-2">
<span class="font-body-sm text-body-sm text-on-surface-variant">Pause</span>
<span class="bg-surface-dim border border-outline-variant px-2 py-1 rounded font-label-mono text-label-mono text-on-surface">ESC</span>
</div>
</div>
</div>
</div>
<!-- Modal Actions -->
<div class="px-lg pb-lg pt-sm flex flex-col gap-md">
<button class="w-full py-md border border-primary text-primary font-label-mono text-label-mono uppercase tracking-widest hover:bg-primary hover:text-surface-dim hover:neon-glow-primary transition-all duration-200 active:scale-95 rounded-lg">
                SAVE PREFERENCES
            </button>
<button class="w-full py-sm text-on-surface-variant font-body-sm text-body-sm hover:text-on-surface transition-colors">
                RETURN TO GAME
            </button>
</div>
</div>
</body></html>
