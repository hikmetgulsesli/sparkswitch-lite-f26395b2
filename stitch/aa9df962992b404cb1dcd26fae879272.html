<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SparkSwitch Lite - Gameplay</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;600;800&amp;family=JetBrains+Mono:wght@500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-dim": "#131315",
                        "surface-container-high": "#2a2a2c",
                        "on-secondary": "#65002e",
                        "surface-bright": "#39393b",
                        "on-secondary-fixed": "#3f001a",
                        "on-primary": "#003543",
                        "on-surface-variant": "#bbc9cf",
                        "outline-variant": "#3c494e",
                        "inverse-surface": "#e5e1e4",
                        "surface-container-low": "#1c1b1d",
                        "on-error": "#690005",
                        "secondary-fixed": "#ffd9e1",
                        "surface-container-lowest": "#0e0e10",
                        "inverse-on-surface": "#313032",
                        "on-tertiary-fixed-variant": "#005233",
                        "secondary-fixed-dim": "#ffb1c4",
                        "on-primary-container": "#00566a",
                        "primary-fixed": "#b6ebff",
                        "secondary": "#ffb1c4",
                        "background": "#131315",
                        "primary-fixed-dim": "#47d6ff",
                        "surface": "#131315",
                        "surface-tint": "#47d6ff",
                        "on-surface": "#e5e1e4",
                        "on-background": "#e5e1e4",
                        "error": "#ffb4ab",
                        "on-primary-fixed": "#001f28",
                        "surface-variant": "#353437",
                        "outline": "#859399",
                        "surface-container": "#201f21",
                        "on-secondary-fixed-variant": "#8f0044",
                        "surface-container-highest": "#353437",
                        "tertiary-fixed-dim": "#00e296",
                        "on-tertiary": "#003822",
                        "tertiary-container": "#00dc92",
                        "on-error-container": "#ffdad6",
                        "tertiary-fixed": "#4dffb1",
                        "on-tertiary-fixed": "#002112",
                        "primary": "#a5e7ff",
                        "secondary-container": "#ff4a8d",
                        "error-container": "#93000a",
                        "on-primary-fixed-variant": "#004e60",
                        "primary-container": "#00d2ff",
                        "inverse-primary": "#00677f",
                        "on-tertiary-container": "#005b3a",
                        "on-secondary-container": "#590028",
                        "tertiary": "#00fca8"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xl": "40px",
                        "hud-padding": "12px",
                        "sm": "8px",
                        "playfield-margin": "64px",
                        "unit": "4px",
                        "lg": "24px",
                        "md": "16px",
                        "xs": "4px"
                    },
                    "fontFamily": {
                        "body-lg": ["Geist"],
                        "display-lg": ["Geist"],
                        "body-sm": ["Geist"],
                        "headline-md": ["Geist"],
                        "label-mono": ["JetBrains Mono"],
                        "label-score": ["JetBrains Mono"],
                        "display-sm": ["Geist"]
                    },
                    "fontSize": {
                        "body-lg": ["18px", { "lineHeight": "1.6", "letterSpacing": "0em", "fontWeight": "400" }],
                        "display-lg": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.04em", "fontWeight": "800" }],
                        "body-sm": ["14px", { "lineHeight": "1.6", "letterSpacing": "0em", "fontWeight": "400" }],
                        "headline-md": ["24px", { "lineHeight": "1.4", "letterSpacing": "0em", "fontWeight": "600" }],
                        "label-mono": ["12px", { "lineHeight": "1", "letterSpacing": "0.1em", "fontWeight": "500" }],
                        "label-score": ["20px", { "lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "700" }],
                        "display-sm": ["32px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "800" }]
                    }
                }
            }
        }
    </script>
<style>
        .cyber-grid {
            background-image: 
                linear-gradient(to right, rgba(60, 73, 78, 0.1) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(60, 73, 78, 0.1) 1px, transparent 1px);
            background-size: 40px 40px;
            mask-image: radial-gradient(circle at center, black 40%, transparent 80%);
            -webkit-mask-image: radial-gradient(circle at center, black 40%, transparent 80%);
        }
        
        .glow-primary {
            box-shadow: 0 0 16px var(--tw-colors-primary-container), inset 0 0 8px var(--tw-colors-primary-container);
        }
        
        .glow-secondary {
            box-shadow: 0 0 16px var(--tw-colors-secondary-container), inset 0 0 8px var(--tw-colors-secondary-container);
        }
        
        .rail-glow {
            filter: drop-shadow(0 0 8px currentColor);
        }
        
        .pulse-animation {
            animation: movePulse 2s linear infinite;
        }
        
        @keyframes movePulse {
            0% { top: 0; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        .hud-panel {
            background: rgba(19, 19, 21, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--tw-colors-outline-variant);
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen overflow-hidden font-body-lg flex flex-col relative selection:bg-primary-container selection:text-on-primary-container">
<!-- Background Grid -->
<div class="absolute inset-0 cyber-grid pointer-events-none z-0"></div>
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-lg py-sm border-b border-outline-variant/30 shadow-[0_0_20px_rgba(71,214,255,0.2)] bg-surface-container-low/80 backdrop-blur-xl">
<div class="font-display-sm text-display-sm font-extrabold tracking-tighter text-primary italic">
            SPARKSWITCH LITE
        </div>
<div class="flex gap-md">
<button aria-label="Pause" class="text-primary hover:text-tertiary transition-colors active:scale-95 duration-100 flex items-center justify-center p-sm rounded-full hover:bg-surface-bright/20">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">pause</span>
</button>
<button aria-label="Settings" class="text-on-surface-variant hover:text-tertiary transition-colors active:scale-95 duration-100 flex items-center justify-center p-sm rounded-full hover:bg-surface-bright/20">
<span class="material-symbols-outlined">settings</span>
</button>
</div>
</header>
<!-- Main Play Area -->
<main class="flex-grow relative z-10 flex items-center justify-center pt-[72px]">
<!-- HUD Elements -->
<div class="absolute top-playfield-margin left-playfield-margin flex flex-col gap-sm z-20">
<div class="hud-panel px-md py-sm rounded border-l-2 border-l-primary flex flex-col">
<span class="font-label-mono text-label-mono text-on-surface-variant uppercase tracking-widest">Score</span>
<span class="font-label-score text-label-score text-primary">002,450</span>
</div>
<div class="hud-panel px-md py-xs rounded flex items-center gap-sm">
<span class="material-symbols-outlined text-tertiary text-sm">stars</span>
<span class="font-label-mono text-label-mono text-tertiary">COMBO x4</span>
</div>
</div>
<div class="absolute top-playfield-margin right-playfield-margin flex flex-col gap-sm z-20 items-end">
<div class="hud-panel px-md py-sm rounded border-r-2 border-r-secondary-container flex flex-col items-end">
<span class="font-label-mono text-label-mono text-on-surface-variant uppercase tracking-widest">Level</span>
<span class="font-label-score text-label-score text-secondary">04</span>
</div>
<div class="hud-panel px-md py-xs rounded flex items-center gap-sm">
<span class="font-label-mono text-label-mono text-on-surface-variant">MULTIPLIER</span>
<span class="font-label-score text-label-score text-primary-fixed-dim">x3</span>
</div>
</div>
<!-- Playfield Container -->
<div class="relative w-[300px] h-[600px] max-h-[819px] bg-surface-container-lowest/50 border border-outline-variant/20 rounded-xl overflow-hidden backdrop-blur-sm shadow-[0_0_40px_rgba(0,0,0,0.5)]">
<!-- Timing Rail Container -->
<div class="absolute inset-0 flex justify-center gap-xl py-xl">
<!-- Left Rail (Blue) -->
<div class="relative h-full w-[2px] bg-primary-container/20">
<div class="absolute inset-0 w-full bg-primary-container rail-glow" style="filter: drop-shadow(0 0 4px var(--tw-colors-primary-container));"></div>
<!-- Target Zone -->
<div class="absolute bottom-[20%] left-1/2 -translate-x-1/2 w-[32px] h-[12px] border-y-2 border-primary-container bg-surface-dim/80 backdrop-blur-md flex items-center justify-center">
<div class="w-[4px] h-[4px] rounded-full bg-primary-container animate-pulse"></div>
</div>
<!-- Moving Pulse -->
<div class="absolute left-1/2 -translate-x-1/2 w-[16px] h-[32px] bg-primary glow-primary rounded-full pulse-animation z-10" style="animation-duration: 1.5s;"></div>
</div>
<!-- Right Rail (Pink) -->
<div class="relative h-full w-[2px] bg-secondary-container/20">
<div class="absolute inset-0 w-full bg-secondary-container rail-glow" style="filter: drop-shadow(0 0 4px var(--tw-colors-secondary-container)); opacity: 0.5;"></div>
<!-- Target Zone -->
<div class="absolute bottom-[20%] left-1/2 -translate-x-1/2 w-[32px] h-[12px] border-y-2 border-outline-variant bg-surface-dim/50 backdrop-blur-md flex items-center justify-center">
</div>
</div>
</div>
<!-- Visual Flare - Perfect Hit Indicator (Hidden by default, shown for comp) -->
<div class="absolute top-[75%] left-1/2 -translate-x-1/2 -translate-y-1/2 font-display-sm text-display-sm text-tertiary font-extrabold italic drop-shadow-[0_0_10px_rgba(0,252,168,0.8)] opacity-0 animate-bounce pointer-events-none" style="opacity: 0.9; animation: bounce 1s infinite;">
                PERFECT!
            </div>
</div>
<!-- Initial State Overlay (Simulated Active) -->
<div class="absolute inset-0 z-40 flex items-center justify-center bg-background/80 backdrop-blur-[20px]">
<div class="flex flex-col items-center gap-lg hud-panel p-xl rounded-xl border-t-[4px] border-t-secondary-container shadow-[0_0_30px_rgba(0,0,0,0.8)] text-center">
<div class="flex flex-col gap-sm">
<h1 class="font-display-lg text-display-lg text-on-surface">READY</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-[300px]">Keep your focus sharp. Switch lanes to catch the pulse in the target zone.</p>
</div>
<button class="relative group mt-md px-xl py-md bg-surface border border-primary text-primary font-headline-md text-headline-md uppercase tracking-wider overflow-hidden transition-all duration-200 hover:bg-primary hover:text-on-primary hover:glow-primary active:scale-95">
<div class="absolute inset-0 bg-primary/10 group-hover:bg-transparent transition-colors"></div>
<span class="relative z-10 flex items-center gap-sm">
                        START GAME
                        <span class="material-symbols-outlined text-lg" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
</span>
</button>
<div class="flex gap-md mt-sm opacity-60">
<div class="flex items-center gap-xs font-label-mono text-label-mono text-on-surface-variant">
<span class="px-xs py-[2px] border border-outline-variant rounded text-[10px]">ESC</span> PAUSE
                    </div>
<div class="flex items-center gap-xs font-label-mono text-label-mono text-on-surface-variant">
<span class="px-xs py-[2px] border border-outline-variant rounded text-[10px]">R</span> RESTART
                    </div>
</div>
</div>
</div>
</main>
<!-- BottomNavBar (Hidden on md, visible on mobile as per logic rules for 'Play' tab) -->
<nav class="md:hidden fixed bottom-0 w-full rounded-t-xl border-t-2 border-primary/50 shadow-[0_-4px_24px_rgba(0,0,0,0.8)] bg-surface-dim/90 backdrop-blur-lg z-50 flex justify-around items-center h-20 px-md pb-safe">
<a class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-xl px-md py-xs shadow-[0_0_15px_rgba(0,210,255,0.4)]" href="#">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">bolt</span>
<span class="font-label-mono text-label-mono">Play</span>
</a>
<a class="flex flex-col items-center justify-center text-outline hover:bg-surface-bright/50 hover:text-primary transition-colors active:scale-90 px-md py-xs rounded-xl" href="#">
<span class="material-symbols-outlined mb-1">leaderboard</span>
<span class="font-label-mono text-label-mono">Rankings</span>
</a>
<a class="flex flex-col items-center justify-center text-outline hover:bg-surface-bright/50 hover:text-primary transition-colors active:scale-90 px-md py-xs rounded-xl" href="#">
<span class="material-symbols-outlined mb-1">person</span>
<span class="font-label-mono text-label-mono">Profile</span>
</a>
</nav>
</body></html>
